databases:
  - name: eyespy-db
    plan: free
    databaseName: eyespy
    user: eyespy

services:
  - type: web
    name: eyespy-grant-scout
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eyespy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
